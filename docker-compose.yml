services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devmind
      POSTGRES_PASSWORD: devmind
      POSTGRES_DB: devmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  agent:
    build: ./apps/agent
    ports:
      - "8000:8000"
    env_file:
      - ./apps/agent/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://devmind:devmind@postgres:5432/devmind
    depends_on:
      - redis
      - postgres

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql://devmind:devmind@postgres:5432/devmind
      - AGENT_URL=http://agent:8000
      - PORT=3001
      - FRONTEND_URL=http://34.205.172.253:3002
    depends_on:
      - postgres
      - agent

  web:
    build: ./apps/web
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://34.205.172.253:3001
    depends_on:
      - api

volumes:
  pgdata:
